name: Build & Deploy Beta Test Site

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout beta-test
        uses: actions/checkout@v4

      # ── Build fresh tarballs from the docmd monorepo ─────────────────────
      # This is the core of the beta-test pipeline: rather than publishing to
      # npm and installing from there, we pack the monorepo at its current
      # state (whatever is on main, pre-release) and install from those tars.
      # This means a manual workflow_dispatch here = a full staging deploy of
      # whatever docmd looks like right now, with zero extra steps needed.
      - name: Checkout docmd monorepo
        uses: actions/checkout@v4
        with:
          repository: docmd-io/docmd
          ref: main
          path: _docmd-source

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: _docmd-source/pnpm-lock.yaml

      - name: Install monorepo dependencies
        run: pnpm install --frozen-lockfile
        working-directory: _docmd-source

      - name: Build monorepo packages
        run: pnpm -r run build
        working-directory: _docmd-source

      - name: Pack tarballs
        run: node tools/sim.mjs --regen-tars --skip-monorepo-build
        working-directory: _docmd-source

      # ── Install & build the beta-test site ───────────────────────────────
      - name: Setup Node.js for site build
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          # No cache — package.json has no @docmd/* deps so cache is unhelpful here

      # Install semantic search peer deps from npm (docmd-search, onnxruntime, transformers)
      - name: Install npm dependencies
        run: npm install --no-audit --no-fund

      # Install all @docmd/* packages directly from the freshly packed tarballs.
      # This overlays the real packages into node_modules without touching package.json.
      - name: Install docmd packages from tarballs
        run: |
          node -e "
          const { execSync } = require('child_process');
          const fs = require('fs');
          const tarDir = './_docmd-source/_playground/local-tars';
          const tars = fs.readdirSync(tarDir)
            .filter(f => f.endsWith('.tgz'))
            .map(f => 'file:' + tarDir + '/' + f);
          if (!tars.length) { console.error('No tarballs found in ' + tarDir); process.exit(1); }
          console.log('Installing', tars.length, 'tarballs...');
          execSync('npm install --no-save ' + tars.join(' '), { stdio: 'inherit' });
          "

      # Cache semantic search embedding models (~270MB) to avoid re-downloading
      - name: Cache embedding models
        uses: actions/cache@v4
        with:
          path: ~/.cache/docmd-search/models
          key: docmd-search-models-${{ runner.os }}-${{ hashFiles('docmd.config.json') }}
          restore-keys: |
            docmd-search-models-${{ runner.os }}-

      - name: Build site
        run: npm run build
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site
          include-hidden-files: true

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4