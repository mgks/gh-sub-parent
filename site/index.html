  docmd-main.css is intentionally NOT loaded.

  Note: menubar, footer and TOC partials are INLINED here (not `include`d)
  because the docmd core resolves `include()` paths relative to the

(function () {

    // 1. Determine Theme
    //
    // Resolve from three sources, in priority order:
    //   1. localStorage explicit user choice (light / dark)
    //   2. window.DOCMD_APPEARANCE  (current canonical name, set by EJS templates)
    //   3. window.DOCMD_DEFAULT_MODE (legacy alias kept for pre-0.8.7 outputs)
    //   4. 'light' as the final fallback

    // 'light' or 'dark' value. A stored 'system' value (from a prior
    // session where the user picked "follow system") must NOT win over
    // a freshly resolved config value — the resolved value will itself
    // be 'system' in that case and the OS preference check below takes
    // over, so this is a no-op for the in-session behaviour but keeps
    // any future storage migration simple.
    var localValue = localStorage.getItem('docmd-theme');
    var configValue = window.DOCMD_APPEARANCE
      || window.DOCMD_DEFAULT_MODE
      || 'light';
    var theme = (localValue === 'light' || localValue === 'dark')

      : configValue;

      theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';

    var darkLink = document.getElementById('hljs-dark');

    if (lightLink && darkLink) {

        lightLink.disabled = true;
        darkLink.disabled = false;
      } else {
        lightLink.disabled = false;
        darkLink.disabled = true;
      }
    }

    document.documentElement.style.visibility = "visible";
  } catch (e) {

    <script>
      (function() {
        var searchDebounceTimer;

        document.addEventListener('click', function(e) {
          var link = e.target.closest('a');
          if (!link || !window.gtag) return;
          
          var url = link.href;
          var hostname = window.location.hostname;
          var isExternal = link.hostname && link.hostname !== hostname;
          var isDownload = link.hasAttribute('download') || url.match(/\.(pdf|zip|tar|gz|exe|pkg)$/i);
          
          if (isExternal) {
            gtag('event', 'click_external', { 'url': url, 'link_text': link.innerText.trim() });
          } else if (isDownload) {
            gtag('event', 'download', { 'file_name': url.split('/').pop(), 'url': url });
          }

          // TOC tracking
          if (link.classList.contains('toc-link')) {
            gtag('event', 'toc_click', { 'target_id': link.getAttribute('href'), 'title': link.innerText.trim() });
          }

          // Permalink tracking
          if (link.classList.contains('heading-anchor')) {
            gtag('event', 'permalink_click', { 'url': url });
          }
        });

        
        // Search Keyword Tracking
        document.addEventListener('input', function(e) {
          if (e.target.id === 'docmd-search-input' && window.gtag) {
            var query = e.target.value.trim();
            if (query.length < 3) return;
            
            clearTimeout(searchDebounceTimer);
            searchDebounceTimer = setTimeout(function() {
              gtag('event', 'search', { 'search_term': query });
            }, 1000);
          }
        });
        
      })();
    </script>
